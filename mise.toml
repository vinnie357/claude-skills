[tasks."update-all-skills"]
description = "Update all-skills plugin.json with all skills from all plugins"
run = """
#!/usr/bin/env bash
set -e

cd "$(git rev-parse --show-toplevel)"

# Check for flags
DRY_RUN=""
VERBOSE=""

for arg in "$@"; do
    case $arg in
        --dry-run|-d)
            DRY_RUN="--dry-run"
            ;;
        --verbose|-v)
            VERBOSE="--verbose"
            ;;
    esac
done

nu .claude-plugin/scripts/update-all-skills.nu $DRY_RUN $VERBOSE
"""

